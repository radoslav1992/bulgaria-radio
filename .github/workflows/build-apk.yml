name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper

      - name: Decode debug keystore
        run: base64 -d debug.keystore.base64 > debug.keystore

      - name: Create .env file
        run: cp .env.example .env

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: radio-bulgaria-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Decode release keystore
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > my-upload-key.jks

      - name: Build release AAB
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: ./gradlew :app:bundleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload release AAB
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: radio-bulgaria-release
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
